services:
  django-soft:
    container_name: django-soft-BV-19-06-2026
    build: .
    image: django-soft-bv-19-06-2026
    restart: always
    ports:
      - "5005:5005"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005"]
      interval: 10s
      timeout: 5s
      retries: 3