services:
  rocket-ecommerce:
    container_name: rocket-ecommerce-BV-19-06-2026
    build: 
      context: .
      args:
        - DB_ENGINE=sqlite3
    image: rocket-ecommerce-bv-19-06-2026
    restart: always
    env_file:
      - .env
    networks:
      - app_net
    healthcheck:
      test: "wget http://localhost:5005"
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  app_net:
    external: true