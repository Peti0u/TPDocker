services:
  nginx:
      container_name: nginx-BV-19-06-2026
      build: "."
      image: nginx-bv-19-06-2026
      restart: always
      ports:
        - "5000:5000"
        - "5001:5001"
      depends_on:
        - django-main:
              condition: service_healthy
        - rocket-ecommerce:
              condition: service_healthy
      healthcheck:
        test: "wget http://localhost || exit 1"